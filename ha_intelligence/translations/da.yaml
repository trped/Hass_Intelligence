configuration:
  mqtt_host:
    name: MQTT Host
    description: Hostname for MQTT broker (typisk core-mosquitto)
  mqtt_port:
    name: MQTT Port
    description: Port for MQTT broker
  mqtt_user:
    name: MQTT Brugernavn
    description: Brugernavn til MQTT broker (tom hvis ingen auth)
  mqtt_password:
    name: MQTT Password
    description: Password til MQTT broker
  feedback_active:
    name: Aktiv feedback
    description: Send notifikationer for at bekræfte forudsigelser
  feedback_max_daily:
    name: Max feedback per dag
    description: Maksimalt antal feedback-spørgsmål per dag
  feedback_cooldown_min:
    name: Feedback cooldown (min)
    description: Minutter mellem feedback-spørgsmål
  feedback_quiet_start:
    name: Stille tid start
    description: Ingen feedback-notifikationer efter dette tidspunkt
  feedback_quiet_end:
    name: Stille tid slut
    description: Feedback-notifikationer genoptages efter dette tidspunkt
  log_level:
    name: Log niveau
    description: Detaljegrad for logging
