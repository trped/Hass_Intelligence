configuration:
  mqtt_host:
    name: MQTT Host
    description: Hostname for MQTT broker (typically core-mosquitto)
  mqtt_port:
    name: MQTT Port
    description: Port for MQTT broker
  mqtt_user:
    name: MQTT Username
    description: Username for MQTT broker (empty if no auth)
  mqtt_password:
    name: MQTT Password
    description: Password for MQTT broker
  feedback_active:
    name: Active feedback
    description: Send notifications to confirm predictions
  feedback_max_daily:
    name: Max feedback per day
    description: Maximum feedback questions per day
  feedback_cooldown_min:
    name: Feedback cooldown (min)
    description: Minutes between feedback questions
  feedback_quiet_start:
    name: Quiet time start
    description: No feedback notifications after this time
  feedback_quiet_end:
    name: Quiet time end
    description: Feedback notifications resume after this time
  log_level:
    name: Log level
    description: Logging detail level
