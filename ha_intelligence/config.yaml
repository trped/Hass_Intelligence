name: "HA Intelligence"
version: "0.1.4"
slug: ha_intelligence
description: "Self-learning household intelligence system"
url: "https://github.com/trped/Hass_Intelligence"
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: mdi:brain
panel_title: Intelligence
homeassistant_api: true
hassio_api: true
auth_api: true
map:
  - config:rw
  - ssl:ro
options:
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  haiku_api_key: ""
  haiku_enabled: false
  haiku_anomaly: true
  haiku_low_confidence: false
  haiku_daily_summary: true
  haiku_energy: false
  haiku_max_tokens_day: 5000
  feedback_active: true
  feedback_max_daily: 3
  feedback_cooldown_min: 120
  feedback_quiet_start: "22:00"
  feedback_quiet_end: "07:00"
  log_level: "info"
schema:
  mqtt_host: str
  mqtt_port: port
  mqtt_user: str?
  mqtt_password: password?
  haiku_api_key: password?
  haiku_enabled: bool
  haiku_anomaly: bool
  haiku_low_confidence: bool
  haiku_daily_summary: bool
  haiku_energy: bool
  haiku_max_tokens_day: int
  feedback_active: bool
  feedback_max_daily: int(1,20)
  feedback_cooldown_min: int(10,1440)
  feedback_quiet_start: str
  feedback_quiet_end: str
  log_level: list(debug|info|warning|error)
